name: Seed Update

on:
  schedule:
    # Central Time = UTC-5 (CDT currently)
    # 4am CT = 09:00 UTC — full update (all 3 seeds, yesterday + catch-up)
    - cron: '0 9 * * 1-5'
    # 8am, 12pm, 4pm CT = 13, 17, 21 UTC — AIM intra-day only
    - cron: '0 13 * * 1-5'
    - cron: '0 17 * * 1-5'
    - cron: '0 21 * * 1-5'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode: full (default) or aim-today'
        required: false
        default: 'full'

jobs:
  update-seeds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Determine run mode
        id: mode
        run: |
          # Manual dispatch uses the input; scheduled uses the hour
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode || 'full' }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            if [ "$HOUR" = "09" ]; then
              echo "mode=full" >> $GITHUB_OUTPUT
            else
              echo "mode=aim-today" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Run seed update
        env:
          AIM_BEARER_TOKEN: ${{ secrets.AIM_BEARER_TOKEN }}
          TCX_DOMAIN: ${{ secrets.TCX_DOMAIN }}
          TCX_USERNAME: ${{ secrets.TCX_USERNAME }}
          TCX_PASSWORD: ${{ secrets.TCX_PASSWORD }}
          MOXY_BEARER: ${{ secrets.MOXY_BEARER }}
        run: |
          if [ "${{ steps.mode.outputs.mode }}" = "aim-today" ]; then
            echo "Running AIM intra-day update..."
            node seed-update.js --aim-today
          else
            echo "Running full seed update..."
            node seed-update.js
          fi

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No seed changes to commit"
          else
            git commit -m "chore: auto seed update $(date -u +%Y-%m-%dT%H:%M)"
            git push
          fi
